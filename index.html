<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Recorrido del campo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --ink: #111827;
      --muted: #667085;
      --card: rgba(255,255,255,.92);
      --card-solid: #ffffff;
      --line: rgba(17,24,39,.12);
      --shadow: 0 14px 40px rgba(0,0,0,.24);
      --green: #0f5f46;
      --green-2: #15a36a;
      --sand: #f3ead7;
      --wc: #1f2937;
      --route: #f7c948;
      --route-dark: #8a5a00;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #f6f4ef;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 520px;
      background: #d7d3c8;
    }

    .top-card {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      z-index: 1000;
      background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,255,255,.84));
      border: 1px solid rgba(255,255,255,.75);
      box-shadow: 0 10px 32px rgba(0,0,0,.20);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 12px 14px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--green);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--route);
      box-shadow: 0 0 0 4px rgba(247,201,72,.22);
    }

    .top-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.035em;
    }

    .top-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .panel {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 88px;
      z-index: 1000;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .panel-inner {
      padding: 11px 14px 12px;
      display: grid;
      gap: 8px;
    }

    .panel-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .nearest-label {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .10em;
      color: var(--muted);
      font-weight: 900;
    }

    .nearest-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
      margin-top: 2px;
    }

    .nearest-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.32;
      margin-top: 3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15,95,70,.10);
      color: var(--green);
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(15,95,70,.16);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: -.01em;
    }

    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary { background: var(--ink); color: white; }
    .secondary { background: rgba(17,24,39,.08); color: var(--ink); }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }

    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .dot.route { background: var(--route); }
    .dot.tee { background: var(--green); }
    .dot.wc { background: var(--wc); }

    .pin {
      width: 31px;
      height: 31px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: -.04em;
      border: 2px solid rgba(255,255,255,.96);
      box-shadow: 0 5px 16px rgba(0,0,0,.32);
      transform: translateZ(0);
    }

    .pin.tee {
      background: radial-gradient(circle at 35% 28%, #2ed38e, var(--green) 66%);
    }

    .pin.wc {
      background: radial-gradient(circle at 35% 28%, #475467, #111827 70%);
      font-size: 9px;
    }

    .pin.start, .pin.finish {
      width: 38px;
      height: 38px;
      font-size: 10px;
      background: radial-gradient(circle at 35% 28%, #ffd968, var(--route-dark) 72%);
      color: #fff;
      border: 3px solid white;
    }

    .leaflet-control-zoom {
      margin-top: 92px !important;
      border: 0 !important;
      box-shadow: 0 6px 18px rgba(0,0,0,.22) !important;
    }
    .leaflet-control-zoom a {
      background: rgba(255,255,255,.93) !important;
      color: var(--ink) !important;
      border: 0 !important;
      font-weight: 900;
    }

    .leaflet-control-attribution {
      font-size: 9px;
      background: rgba(255,255,255,.64) !important;
    }

    @media (max-height: 650px) {
      .top-card { padding: 10px 12px; }
      .top-title { font-size: 18px; }
      .top-subtitle { display: none; }
      .nearest-desc { display: none; }
      .panel { bottom: 76px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <section class="top-card" aria-label="Título del mapa">
    <div class="eyebrow">Recorrido explicativo</div>
    <h1 class="top-title">Mapa del campo</h1>
    <div class="top-subtitle">Vista general del recorrido, salidas y servicios principales.</div>
  </section>

  <section class="panel" aria-label="Información del punto seleccionado">
    <div class="panel-inner">
      <div class="panel-row">
        <div>
          <div class="nearest-label" id="panelLabel">Vista general</div>
          <div class="nearest-title" id="nearestTitle">Recorrido completo</div>
          <div class="nearest-desc" id="nearestDesc">Toca un hoyo o servicio para ver la referencia y abrir navegación.</div>
        </div>
        <div class="badge" id="panelBadge">18H</div>
      </div>
      <div class="actions">
        <button class="primary" id="navBtn" disabled>Abrir navegación</button>
        <button class="secondary" id="fitBtn">Ver recorrido</button>
      </div>
      <div class="legend">
        <span><i class="dot route"></i> Recorrido</span>
        <span><i class="dot tee"></i> Hoyos</span>
        <span><i class="dot wc"></i> Servicios</span>
      </div>
    </div>
  </section>

<script>
const POINTS = [

    "type": "TEE",

  },
  {

    "type": "TEE",

    "lng": -2.840065337749178
  },
  {

    "type": "TEE",
    "label": "H3",
    "lat": 43.24956590068041,
    "lng": -2.8412859874033587
  },
  {
    "hole": 4,

    "type": "TEE",
    "label": "H4",
    "lat": 43.24999026303395,
    "lng": -2.8451935346697534
  },
  {

  {

    "type": "TEE",

    "lat": 43.25110602924869,
    "lng": -2.845170933172965
  },
  {
    "hole": 7,
    "title": "Hoyo 7",
    "description": "Salida del hoyo 7 · toca para abrir navegación",
    "type": "TEE",

    "lat": 43.25188888251861,
    "lng": -2.8449298505780836
  },
  {
    "hole": 8,

  },
  {

  {

    "type": "TEE",

  {

    "description": "Salida del hoyo 14 · toca para abrir navegación",
    "type": "TEE",

  {

  {

    "type": "TEE",

  },
  {
    "hole": 18,
    "title": "Hoyo 18",
    "description": "Salida del hoyo 18 · toca para abrir navegación",
    "type": "TEE",
    "label": "H18",
    "lat": 43.24583882281844,
    "lng": -2.8273300859543053
  },
  {
    "hole": null,
    "title": "Baños",
    "description": "Servicios disponibles en el campo",
    "type": "WC",
    "label": "WC",
    "lat": 43.251302123591074,
    "lng": -2.845175194124546
  },
  {
    "hole": null,
    "title": "Baños",
    "description": "Servicios disponibles en el campo",
    "type": "WC",
    "label": "WC",
    "lat": 43.24449228084935,
    "lng": -2.822544195052172
  }
];

const map = L.map('map', { zoomControl: false, attributionControl: true });
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: 'Tiles © Esri'
}).addTo(map);

L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: ''
}).addTo(map);

const HOLES = POINTS.filter(p => p.type === 'TEE').sort((a,b) => a.hole - b.hole);
const routeCoords = HOLES.map(p => [p.lat, p.lng]);
let selectedPoint = null;

// Trazado simple del recorrido: une las salidas H1-H18 en orden.
// En una fase posterior se puede sustituir por un GeoJSON/GPX con el camino real.
const routeHalo = L.polyline(routeCoords, { color: '#ffffff', weight: 9, opacity: .78, lineCap: 'round', lineJoin: 'round' }).addTo(map);
const routeLine = L.polyline(routeCoords, { color: '#f7c948', weight: 5, opacity: .95, lineCap: 'round', lineJoin: 'round' }).addTo(map);

const markers = [];

function markerClass(point) {
  if (point.type === 'WC') return 'wc';
  if (point.hole === 1) return 'start';
  if (point.hole === 18) return 'finish';
  return 'tee';
}

function markerLabel(point) {
  if (point.type === 'WC') return 'WC';
  if (point.hole === 1) return 'H1';
  if (point.hole === 18) return 'H18';
  return point.label;
}

function iconSize(point) {
  return (point.hole === 1 || point.hole === 18) ? [38,38] : [31,31];
}

function divIcon(point) {
  const size = iconSize(point);
  return L.divIcon({
    className: '',
    html: `<div class="pin ${markerClass(point)}">${markerLabel(point)}</div>`,
    iconSize: size,
    iconAnchor: [size[0]/2, size[1]/2]
  });
}

function navUrl(lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}

function cleanDescription(point) {
  if (point.type === 'WC') return 'Servicio disponible en el recorrido.';
  if (point.hole === 1) return 'Inicio del recorrido del campo.';
  if (point.hole === 18) return 'Última salida del recorrido.';
  return `Salida del hoyo ${point.hole} dentro del recorrido.`;
}

function setPanel(point) {
  selectedPoint = point;
  document.getElementById('navBtn').disabled = false;
  document.getElementById('panelLabel').textContent = point.type === 'WC' ? 'Servicio' : 'Referencia del recorrido';
  document.getElementById('nearestTitle').textContent = point.title;
  document.getElementById('nearestDesc').textContent = cleanDescription(point);
  document.getElementById('panelBadge').textContent = point.type === 'WC' ? 'WC' : `H${point.hole}`;
}

POINTS.forEach(point => {
  const m = L.marker([point.lat, point.lng], { icon: divIcon(point), keyboard: false }).addTo(map);
  m.on('click', () => {
    setPanel(point);
    map.panTo([point.lat, point.lng], { animate: true });
  });
  markers.push(m);
});

const group = L.featureGroup([...markers, routeHalo, routeLine]);
function fitCourse() {
  map.fitBounds(group.getBounds().pad(0.20));
}
fitCourse();

// Panel inicial.
document.getElementById('navBtn').addEventListener('click', () => {
  if (!selectedPoint) return;
  window.open(navUrl(selectedPoint.lat, selectedPoint.lng), '_blank', 'noopener');
});

document.getElementById('fitBtn').addEventListener('click', fitCourse);
</script>
</body>
</html>

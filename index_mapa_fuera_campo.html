<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mapa del campo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: rgba(17,24,39,.12);
      --card: rgba(255,255,255,.94);
      --shadow: 0 8px 28px rgba(0,0,0,.18);
      --tee: #135f4a;
      --wc: #1f2937;
      --user: #2563eb;
    }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    .shell { height: 100%; display: grid; grid-template-rows: auto 1fr auto; }
    .header { padding: 12px 14px 8px; }
    .title { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
    .subtitle { color: var(--muted); font-size: 13px; margin-top: 3px; }
    #map { width: 100%; height: 100%; min-height: 440px; }
    .panel { position: fixed; left: 10px; right: 10px; bottom: 88px; z-index: 999; background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); overflow: hidden; backdrop-filter: blur(10px); }
    .panel-inner { padding: 10px 14px; display: grid; gap: 6px; }
    .nearest-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 700; }
    .nearest-title { font-size: 18px; font-weight: 800; line-height: 1.1; }
    .nearest-desc { font-size: 13px; color: var(--muted); line-height: 1.3; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { border: 0; border-radius: 12px; padding: 10px 12px; font-weight: 800; font-size: 13px; cursor: pointer; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary { background: #111827; color: white; grid-column: 1 / -1; }
    .secondary { background: rgba(17,24,39,.08); color: #111827; }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 9px; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .dot.tee { background: var(--tee); }
    .dot.wc { background: var(--wc); }
    .dot.user { background: var(--user); }
    .pin { width: 30px; height: 30px; border-radius: 999px; display: grid; place-items: center; color: white; font-size: 10px; font-weight: 900; box-shadow: 0 2px 10px rgba(0,0,0,.35); border: 2px solid rgba(255,255,255,.9); }
    .pin.tee { background: var(--tee); }
    .pin.wc { background: var(--wc); font-size: 9px; }
    .pin.user { background: var(--user); width: 18px; height: 18px; border: 4px solid rgba(255,255,255,.95); box-shadow: 0 0 0 6px rgba(37,99,235,.22), 0 3px 12px rgba(0,0,0,.35); }
    .leaflet-popup-content-wrapper { border-radius: 14px; }
    .popup-title { font-weight: 900; font-size: 14px; }
    .popup-desc { margin-top: 3px; color: #4b5563; font-size: 12px; }
    .popup-nav { display: inline-block; margin-top: 8px; color: #111827; font-weight: 800; text-decoration: none; font-size: 12px; }
    @media (max-height: 620px) { #map { min-height: 360px; } .nearest-desc { display:none; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h1 class="title">Mapa del campo</h1>
      <div class="subtitle">Toca un punto o usa la ubicación capturada por Glide para orientarte.</div>
    </div>
    <div id="map"></div>
  </div>

  <div class="panel">
    <div class="panel-inner">
      <div>
        <div class="nearest-label">Referencia del campo</div>
        <div class="nearest-title" id="nearestTitle">Ganguren · puntos del recorrido</div>
        <div class="nearest-desc" id="nearestDesc">Actualiza tu ubicación en Glide para ver el punto más cercano.</div>
      </div>
      <div class="actions">
        <button class="primary" id="navBtn" disabled>Abrir navegación</button>
        <button class="secondary" id="locateBtn">Centrarme</button>
        <button class="secondary" id="fitBtn">Ver campo</button>
      </div>
      <div class="legend">
        <span><i class="dot tee"></i> Salidas</span>
        <span><i class="dot wc"></i> Servicios</span>
        <span><i class="dot user"></i> Tú</span>
      </div>
    </div>
  </div>

<script>
const POINTS = [

  {

    "title": "Baños",

    "type": "WC",
    "label": "WC",
    "lat": 43.251302123591074,
    "lng": -2.845175194124546
  },
  {
    "hole": null,
    "title": "Baños",
    "description": "Servicios disponibles en el campo",
    "type": "WC",
    "label": "WC",
    "lat": 43.24449228084935,
    "lng": -2.822544195052172
  }
];

const map = L.map('map', { zoomControl: false, attributionControl: true });
L.control.zoom({ position: 'topright' }).addTo(map);

// Capa satélite. Para producción recomendamos Mapbox/MapTiler con una clave propia.
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: 'Tiles © Esri'
}).addTo(map);

// Etiquetas encima del satélite.
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 20,
  attribution: ''
}).addTo(map);

const markers = [];
let userMarker = null;
let userLatLng = null;
let nearestPoint = null;
let selectedPoint = null;
const OFF_COURSE_DISTANCE_METERS = 1500;

function markerClass(type) {
  return type === 'WC' ? 'wc' : 'tee';
}
function markerLabel(point) {
  return point.type === 'WC' ? 'WC' : point.label;
}
function navUrl(lat, lng) {
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
}
function divIcon(point) {
  return L.divIcon({
    className: '',
    html: `<div class="pin ${markerClass(point.type)}">${markerLabel(point)}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -12]
  });
}
function popupHtml(point) {
  return `<div class="popup-title">${escapeHtml(point.title)}</div>
          <div class="popup-desc">${escapeHtml(point.description)}</div>
          <a class="popup-nav" target="_blank" rel="noopener" href="${navUrl(point.lat, point.lng)}">Abrir navegación</a>`;
}
function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

POINTS.forEach(point => {
  const m = L.marker([point.lat, point.lng], { icon: divIcon(point) }).addTo(map);
  m.on('click', () => {
    setPanel(point);
    map.panTo([point.lat, point.lng], { animate: true });
  });
  markers.push(m);
});

const group = L.featureGroup(markers);
map.fitBounds(group.getBounds().pad(0.18));

function setPanel(point, distanceMeters=null) {
  selectedPoint = point;
  document.getElementById('navBtn').disabled = false;

  const navBtn = document.getElementById('navBtn');
  const labelEl = document.querySelector('.nearest-label');
  const titleEl = document.getElementById('nearestTitle');
  const descEl = document.getElementById('nearestDesc');

  if (distanceMeters != null && distanceMeters > OFF_COURSE_DISTANCE_METERS) {
    labelEl.textContent = 'Fuera del campo';
    titleEl.textContent = 'Estás fuera del campo';
    descEl.textContent = `Punto más cercano: ${point.title} · ${formatDistance(distanceMeters)} aprox.`;
    navBtn.textContent = 'Navegar al campo';
    return;
  }

  labelEl.textContent = 'Referencia del campo';
  titleEl.textContent = point.title;
  const distText = distanceMeters == null ? '' : ` · ${formatDistance(distanceMeters)} aprox.`;
  descEl.textContent = `${point.description}${distText}`;
  navBtn.textContent = 'Abrir navegación';
}
function formatDistance(m) {
  if (m < 1000) return `${Math.round(m)} m`;
  return `${(m/1000).toFixed(1).replace('.', ',')} km`;
}
function haversine(a, b) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}
function nearestTo(latlng, typeFilter=null) {
  const candidates = typeFilter ? POINTS.filter(p => p.type === typeFilter) : POINTS;
  let best = null;
  for (const p of candidates) {
    const d = haversine({lat: latlng.lat, lng: latlng.lng}, {lat: p.lat, lng: p.lng});
    if (!best || d < best.distance) best = { point: p, distance: d };
  }
  return best;
}
function updateUser(lat, lng, focus=false) {
  userLatLng = { lat, lng };
  if (userMarker) userMarker.setLatLng([lat, lng]);
  else {
    const icon = L.divIcon({ className: '', html: '<div class="pin user"></div>', iconSize: [26,26], iconAnchor: [13,13] });
    userMarker = L.marker([lat, lng], { icon }).addTo(map);
  }
  const nearest = nearestTo(userLatLng);
  nearestPoint = nearest.point;
  setPanel(nearest.point, nearest.distance);
  if (focus) map.setView([lat, lng], 17);
}

function parseUserLocationFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const loc = params.get('loc') || params.get('location') || params.get('coords');
  const latParam = params.get('lat');
  const lngParam = params.get('lng') || params.get('lon');

  if (loc) {
    const clean = decodeURIComponent(loc).trim().replace(/[{}()\[\]]/g, '');
    const parts = clean.split(',').map(v => parseFloat(v.trim()));
    if (parts.length >= 2 && Number.isFinite(parts[0]) && Number.isFinite(parts[1])) {
      return { lat: parts[0], lng: parts[1] };
    }
  }

  const lat = parseFloat(latParam);
  const lng = parseFloat(lngParam);
  if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
  return null;
}

function centerOnKnownUserLocation() {
  if (userLatLng) {
    const nearest = nearestTo(userLatLng);
    nearestPoint = nearest.point;
    setPanel(nearest.point, nearest.distance);
    map.setView([userLatLng.lat, userLatLng.lng], 17);
    return true;
  }
  return false;
}

document.getElementById('navBtn').addEventListener('click', () => {
  if (!selectedPoint) return;
  window.open(navUrl(selectedPoint.lat, selectedPoint.lng), '_blank', 'noopener');
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (centerOnKnownUserLocation()) return;

  if (!navigator.geolocation) {
    document.getElementById('nearestTitle').textContent = 'Ubicación no disponible';
    document.getElementById('nearestDesc').textContent = 'El mapa está dentro de Glide. Pasa la ubicación desde Glide o abre el mapa fuera de la app.';
    return;
  }

  document.getElementById('nearestDesc').textContent = 'Buscando tu ubicación…';
  navigator.geolocation.getCurrentPosition(
    pos => updateUser(pos.coords.latitude, pos.coords.longitude, true),
    err => {
      document.getElementById('nearestTitle').textContent = 'No se pudo obtener la ubicación';
      document.getElementById('nearestDesc').textContent = 'Dentro de Glide puede estar bloqueada por el iframe. Usa la ubicación capturada por Glide o abre el mapa fuera.';
    },
    { enableHighAccuracy: true, timeout: 9000, maximumAge: 15000 }
  );
});

const initialUserLocation = parseUserLocationFromUrl();
if (initialUserLocation) {
  updateUser(initialUserLocation.lat, initialUserLocation.lng, false);
}

document.getElementById('fitBtn').addEventListener('click', () => {
  map.fitBounds(group.getBounds().pad(0.18));
});
</script>

</html>
